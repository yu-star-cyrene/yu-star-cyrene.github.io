<script>
(function() {
    function applyFolding() {
        const contentDiv = document.getElementById('article-content');
        // 防止重复执行
        if (!contentDiv || contentDiv.dataset.processed === "true") return;
        contentDiv.dataset.processed = "true";

        const children = Array.from(contentDiv.children);
        if (children.length === 0) return;

        const newContainer = document.createDocumentFragment();
        let currentDetails = null;
        let currentContentDiv = null;

        // === 判别函数 V11 ===
        const isHeader = (el) => {
            const text = el.innerText.trim();
            const tagName = el.tagName.toLowerCase();
            
            // 规则1: 只要是 H1-H6，就是标题 (不管里面写啥)
            if (/^h[1-6]$/.test(tagName)) {
                return { match: true, text: text.replace(/^[#＃\s]+/, '') };
            }

            // 规则2: 【核心修改】不看标签类型了！
            // 只要这一行的文字是 "#" 开头，且包含数字，就认为是标题！
            // 匹配: #1. / ## 2. / ###3.base47 / ＃4.
            if (/^[#＃]+\s*\d/.test(text)) {
                // 安全检查：如果这行字特别长(比如代码里的一行注释)，忽略它
                // 标题一般不会超过80个字
                if (text.length < 80) {
                     return { match: true, text: text.replace(/^[#＃\s]+/, '') };
                }
            }
            
            return { match: false };
        };

        children.forEach(el => {
            const check = isHeader(el);

            if (check.match) {
                // 🛑 命中！是标题！
                if (currentDetails) {
                    currentDetails.appendChild(currentContentDiv);
                    newContainer.appendChild(currentDetails);
                }

                // 创建折叠框
                currentDetails = document.createElement('details');
                currentDetails.className = 'auto-collapse';
                
                // 标题栏
                const summary = document.createElement('summary');
                summary.innerText = check.text; // 去掉 # 后的干净文字
                currentDetails.appendChild(summary);

                // 内容区
                currentContentDiv = document.createElement('div');
                currentContentDiv.className = 'collapse-content';
            } else {
                // 📄 普通内容
                if (currentContentDiv) {
                    currentContentDiv.appendChild(el);
                } else {
                    newContainer.appendChild(el);
                }
            }
        });

        if (currentDetails) {
            currentDetails.appendChild(currentContentDiv);
            newContainer.appendChild(currentDetails);
        }

        if (newContainer.children.length > 0) {
            contentDiv.innerHTML = '';
            contentDiv.appendChild(newContainer);
        }
    }

    // 暴力监听：页面加载、内容变化都尝试触发
    window.addEventListener("load", applyFolding);
    document.addEventListener("DOMContentLoaded", applyFolding);
})();
</script>
