<script>
document.addEventListener("DOMContentLoaded", function() {
    const contentDiv = document.getElementById('article-content');
    if (!contentDiv) return;

    const children = Array.from(contentDiv.children);
    if (children.length === 0) return;

    const newContainer = document.createDocumentFragment();
    let currentDetails = null;
    let currentContentDiv = null;

    // === V5 核心判定逻辑 ===
    const getHeaderInfo = (el) => {
        const text = el.innerText.trim();
        const tagName = el.tagName.toLowerCase();
        
        // 1. 如果是 H1-H6 标签（说明 Markdown 里写了 # 且加了空格，如 "# 1. 题目"）
        // 我们认为这肯定是标题
        if (['h1','h2','h3','h4','h5','h6'].includes(tagName)) {
             // 只有当它是数字开头时才折叠，避免把 "小结" 这种副标题也折叠了
             // 如果你想折叠所有 H 标签，可以去掉这个正则判断
             if (/^\d+/.test(text) || text.startsWith('#')) {
                 return { isHeader: true, text: text };
             }
             return { isHeader: true, text: text };
        }

        // 2. 如果是 P 或 DIV 标签（说明 Markdown 写法不规范，如 "####4.题目" 没加空格）
        // 关键点：只有以 # 开头的才算！这能完美避开正文里的 "1.if(...)"
        if ((tagName === 'p' || tagName === 'div') && text.startsWith('#')) {
            // 必须包含数字，防止误伤普通强调文本
            if (/^#+\s*\d+/.test(text)) {
                const cleanText = text.replace(/^#+\s*/, ''); // 去掉 # 号
                return { isHeader: true, text: cleanText };
            }
        }
        
        return { isHeader: false };
    };

    children.forEach(el => {
        const info = getHeaderInfo(el);

        if (info.isHeader) {
            // 🛑 遇到新标题：打包上一个
            if (currentDetails) {
                currentDetails.appendChild(currentContentDiv);
                newContainer.appendChild(currentDetails);
            }

            // 创建新折叠框
            currentDetails = document.createElement('details');
            currentDetails.className = 'auto-collapse';
            
            // 标题
            const summary = document.createElement('summary');
            summary.innerText = info.text;
            currentDetails.appendChild(summary);

            // 内容区
            currentContentDiv = document.createElement('div');
            currentContentDiv.className = 'collapse-content';
        } else {
            // 📄 正文内容（包括你的 1.if(...)）
            if (currentContentDiv) {
                currentContentDiv.appendChild(el);
            } else {
                newContainer.appendChild(el);
            }
        }
    });

    // 处理最后一个
    if (currentDetails) {
        currentDetails.appendChild(currentContentDiv);
        newContainer.appendChild(currentDetails);
    }

    // 更新页面
    if (newContainer.children.length > 0) {
        contentDiv.innerHTML = '';
        contentDiv.appendChild(newContainer);
    }
});
</script>
